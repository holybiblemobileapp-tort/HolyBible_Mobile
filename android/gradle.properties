# Optimized memory for large asset processing
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Limit the Kotlin daemon separately to ensure it doesn't fight with Gradle for memory
kotlin.daemon.jvmargs=-Xmx2G

# Android feature flags
android.useAndroidX=true
android.enableJetifier=true
kotlin.compiler.execution.strategy=in-process

# Performance & Timeout Fixes
android.enableResourceOptimizations=false
android.nonTransitiveRClass=true
android.defaults.buildfeatures.buildconfig=true

# Fix for AAPT2 timeouts (Updated to the correct property name)
android.overridePathCheck=true

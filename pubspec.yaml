name: holybible_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  just_audio: 0.10.5
  just_audio_windows: ^0.2.2
  audio_session: ^0.1.25
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.4.0
  sqlite3_flutter_libs: ^0.6.0
  path: ^1.9.1
  share_plus: ^7.2.2
  shared_preferences: ^2.5.4
  google_fonts: ^6.2.1
  path_provider: ^2.1.5
  dio: ^5.8.0+1
  flutter_tts: ^4.2.2
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon_foreground.png"
  adaptive_icon_background: "#5D4037"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  windows:
    generate: true
    image_path: "assets/icon_foreground.png"
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - README.md
    - assets/Bible.json
    - assets/CONTINUITY.json
    - assets/AUXILIARY.json
    - assets/PARENTHESES.json
    - assets/HELP.md
    - assets/MANUAL.md
    - assets/NO_WARRANTY_AGREEMENT.md
    - assets/icon_foreground.png
    - assets/IGoToTheFather1B.PNG
    - assets/IGoToTheFather.svg
    - assets/YOUR_STRONG_REASONS.md
    - assets/sync/
    - assets/audio/
